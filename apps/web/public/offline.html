<!DOCTYPE html>
<html lang="pl" style="background:#0d1117;color:#e2e8f0">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<title>Brak połączenia — NutriCoach</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0b9aa0;--bg:#0d1117;--surface:#131920;--border:#1e2a38;--text:#e2e8f0;--muted:#64748b}
html,body{min-height:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top,20px) env(safe-area-inset-right,20px) env(safe-area-inset-bottom,20px) env(safe-area-inset-left,20px)}
.card{max-width:360px;width:100%;text-align:center;padding:2.5rem 2rem;background:var(--surface);border:1px solid var(--border);border-radius:1.25rem;box-shadow:0 20px 56px rgba(0,0,0,0.7)}
.icon-wrap{width:64px;height:64px;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;border-radius:1rem;background:rgba(11,154,160,0.12);border:1px solid rgba(11,154,160,0.2)}
.icon-wrap svg{width:32px;height:32px}
h1{font-size:1.25rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:.5rem}
p{font-size:.875rem;color:var(--muted);line-height:1.6;margin-bottom:1.5rem}
.status{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.75rem;color:var(--muted);margin-bottom:1.5rem}
.dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 2s ease-in-out infinite}
.dot.online{background:#22c55e;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.75rem 1.25rem;border-radius:.625rem;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;background:var(--primary);color:#0d1117;margin-bottom:.75rem}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0);filter:brightness(.95)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);margin-bottom:0}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tips{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);text-align:left}
.tips h2{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem}
.tip{display:flex;align-items:flex-start;gap:.625rem;font-size:.8125rem;color:var(--muted);margin-bottom:.5rem}
.tip:last-child{margin-bottom:0}
.tip-dot{width:4px;height:4px;border-radius:50%;background:var(--primary);margin-top:.35rem;flex-shrink:0}
.footer{margin-top:1.5rem;font-size:.6875rem;color:var(--border)}
</style>
</head>
<body>
<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="10" y="10" width="17" height="80" rx="2" fill="#0b9aa0"/>
      <rect x="73" y="10" width="17" height="80" rx="2" fill="#0b9aa0"/>
      <polygon points="27,10 44,10 73,90 56,90" fill="#0b9aa0"/>
    </svg>
  </div>

  <div id="status" class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">Brak połączenia</span>
  </div>

  <h1>Jesteś offline</h1>
  <p>NutriCoach potrzebuje połączenia z internetem, żeby wyświetlić Twoje dane. Sprawdź Wi-Fi lub dane mobilne i spróbuj ponownie.</p>

  <button class="btn" onclick="tryReload()" id="reload-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
    </svg>
    Odśwież stronę
  </button>
  <button class="btn btn-ghost" onclick="window.history.back()">Wróć</button>

  <div class="tips">
    <h2>Możliwe przyczyny</h2>
    <div class="tip"><span class="tip-dot"></span><span>Wyłączone Wi-Fi lub dane mobilne</span></div>
    <div class="tip"><span class="tip-dot"></span><span>Słaby sygnał sieci komórkowej</span></div>
    <div class="tip"><span class="tip-dot"></span><span>Serwer chwilowo niedostępny</span></div>
  </div>

  <p class="footer">NutriCoach v2 · Tryb offline</p>
</div>

<script>
function tryReload(){
  var btn=document.getElementById('reload-btn');
  btn.disabled=true;
  btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>Sprawdzanie...';
  setTimeout(function(){window.location.reload()},800);
}

function updateStatus(){
  var dot=document.getElementById('dot');
  var txt=document.getElementById('status-text');
  if(navigator.onLine){
    dot.className='dot online';
    txt.textContent='Połączono — odświeżam...';
    setTimeout(function(){window.location.reload()},1200);
  }else{
    dot.className='dot';
    txt.textContent='Brak połączenia';
  }
}

window.addEventListener('online',updateStatus);
window.addEventListener('offline',updateStatus);
updateStatus();
</script>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
</body>
</html>
